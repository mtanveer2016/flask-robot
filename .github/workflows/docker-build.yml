name: Docker Build and Push

# Controls when the action will run
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A workflow run is made up of one or more jobs
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # Updated to v4 (v2 is deprecated)

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # Updated to v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # Updated to v3
      
      
      - name: Debug Secrets (Safe)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Error: DOCKERHUB_USERNAME secret is empty or not set."
          else
            echo "Success: DOCKERHUB_USERNAME secret has a value (length: ${#DOCKERHUB_USERNAME})"
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Error: DOCKERHUB_TOKEN secret is empty or not set."
          else
            echo "Success: DOCKERHUB_TOKEN secret has a value (length: ${#DOCKERHUB_TOKEN})"
          fi


      - name: Login to DockerHub
        uses: docker/login-action@v3  # Updated to v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5  # Updated to v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: 82mtanveer/myrepo:flask-robot_v1
