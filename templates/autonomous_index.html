<!DOCTYPE html>
<html>
<head>
    <title>Manual Control - Robot Car</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        button {
            font-size: 24px;
            padding: 20px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .forward { background: #4CAF50; color: white; }
        .backward { background: #f44336; color: white; }
        .left { background: #ff9800; color: white; }
        .right { background: #2196F3; color: white; }
        .stop { background: #9e9e9e; color: white; font-size: 20px; }
        .speed-control {
            margin: 20px;
            padding: 20px;
            background: #16213e;
            border-radius: 10px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #0f3460;
            border-radius: 10px;
        }
        .nav-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #9c27b0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Manual Control Mode</h1>
        <a href="/autonomous" class="nav-link">🤖 Switch to Autonomous Mode</a>
        
        <div style="margin-top: 30px;">
            <button class="forward" onmousedown="startMove('forward')" onmouseup="stopMove()" ontouchstart="startMove('forward')" ontouchend="stopMove()">▲ FORWARD</button>
        </div>
        <div>
            <button class="left" onmousedown="startMove('left')" onmouseup="stopMove()" ontouchstart="startMove('left')" ontouchend="stopMove()">◀ LEFT</button>
            <button class="stop" onclick="stopCar()">■ STOP</button>
            <button class="right" onmousedown="startMove('right')" onmouseup="stopMove()" ontouchstart="startMove('right')" ontouchend="stopMove()">RIGHT ▶</button>
        </div>
        <div>
            <button class="backward" onmousedown="startMove('backward')" onmouseup="stopMove()" ontouchstart="startMove('backward')" ontouchend="stopMove()">▼ BACKWARD</button>
        </div>
        
        <div class="speed-control">
            <h3>Speed Control</h3>
            <input type="range" id="speed" min="0" max="2000" value="1000" step="100">
            <p>Speed: <span id="speedValue">1000</span></p>
        </div>
        
        <div>
            <button onclick="beep()">🔊 BEEP</button>
            <button onclick="setLED('red')">🔴 Red LED</button>
            <button onclick="setLED('green')">🟢 Green LED</button>
            <button onclick="setLED('blue')">🔵 Blue LED</button>
        </div>
        
        <div class="status">
            <h3>Status</h3>
            <p id="statusText">Ready</p>
        </div>
    </div>
    
    <script>
        let activeMove = null;
        
        function startMove(direction) {
            if (activeMove) return;
            activeMove = direction;
            fetch(`/${direction}`)
                .then(() => updateStatus(`Moving ${direction}`));
        }
        
        function stopMove() {
            if (activeMove) {
                fetch('/stop')
                    .then(() => updateStatus('Stopped'));
                activeMove = null;
            }
        }
        
        function stopCar() {
            fetch('/stop')
                .then(() => updateStatus('Stopped'));
            if (activeMove) activeMove = null;
        }
        
        function beep() {
            fetch('/beep')
                .then(() => updateStatus('Beep!'));
        }
        
        function setLED(color) {
            fetch(`/led/${color}`)
                .then(() => updateStatus(`LED: ${color}`));
        }
        
        const speedSlider = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        
        speedSlider.addEventListener('input', function() {
            const speed = this.value;
            speedValue.textContent = speed;
            fetch(`/speed/${speed}`)
                .then(() => updateStatus(`Speed set to ${speed}`));
        });
        
        function updateStatus(message) {
            document.getElementById('statusText').textContent = message;
            setTimeout(() => {
                if (document.getElementById('statusText').textContent === message) {
                    document.getElementById('statusText').textContent = 'Ready';
                }
            }, 2000);
        }
        
        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            fetch('/stop');
        });
    </script>
</body>
</html>
