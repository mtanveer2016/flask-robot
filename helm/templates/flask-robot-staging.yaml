apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-robot-staging
  namespace: argocd
spec:
  destination:
    namespace: staging
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valueFiles:
        - values-staging.yaml
    path: helm
    repoURL: https://github.com/mtanveer2016/flask-robot
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

      # ... other settings ...
image:
  repository: 82mtanveer/myrepo
  tag: flask-robot_v1   # <--- CHANGE THIS to a tag that exists
  pullPolicy: IfNotPresent
# ... other settings ...