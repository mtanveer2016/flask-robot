namespace:
  name: prod

service:
  port: 5002
  targetPort: 5002
  protocol: TCP
  type: LoadBalancer

image:
  repository: 82mtanveer/myrepo
  tag: flask-robot_v1   # ← Change from 'stable' to this
  pullPolicy: Always

replicaCount: 1

resources:
  requests:
    cpu: 350m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi