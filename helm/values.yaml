namespace:
  name: sandbox

service:
  port: 5002
  targetPort: 5002
  protocol: TCP
  type: ClusterIP

image:
  repository: 82mtanveer/myrepo/flask-robot_v1
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

ports:
  containerPort: 5002
  protocol: TCP

# Optional but recommended additions
fullnameOverride: ""
nameOverride: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env: []
# - name: ENV_VAR
#   value: "value"

nodeSelector: {}

tolerations: []

affinity: {}